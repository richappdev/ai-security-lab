version: 1

tools:
  - name: inspect_headers
    category: passive
    risk: passive
    entrypoint: tools/passive/headers.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Inspect HTTP response headers for common security headers.

  - name: inspect_cookies
    category: passive
    risk: passive
    entrypoint: tools/passive/cookies.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Inspect cookie attributes such as HttpOnly, Secure, and SameSite.

  - name: discover_forms
    category: passive
    risk: passive
    entrypoint: tools/passive/forms.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Discover forms on same-origin pages without submitting payloads.

  - name: lab_xss_reflection_check
    category: active
    risk: active-low-risk
    entrypoint: tools/active/xss_lab_check.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Run a harmless single-request reflected-input check against approved lab targets only.

  - name: lab_http_methods_check
    category: active
    risk: active-low-risk
    entrypoint: tools/active/http_methods_check.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Send a single-request OPTIONS check to report allowed HTTP methods on approved lab targets only.

  - name: lab_route_exists_check
    category: active
    risk: active-low-risk
    entrypoint: tools/active/route_exists_check.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Send a single-request HEAD check for one known route path on an approved lab target only.

  - name: lab_security_header_delta_check
    category: active
    risk: active-low-risk
    entrypoint: tools/active/security_header_delta_check.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Send a fixed two-request GET check to compare security headers between root and one known route on an approved lab target only.

  - name: lab_auth_page_metadata_check
    category: active
    risk: active-low-risk
    entrypoint: tools/active/auth_page_metadata_check.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Send a single-request GET check to inspect authentication page metadata on one approved lab route without submitting credentials.

  - name: lab_bulk_route_exists_check
    category: active
    risk: active-low-risk
    entrypoint: tools/active/bulk_route_exists_check.py
    allowed_targets_file: targets.allowlist
    requires_network: true
    timeout_seconds: 10
    audit_required: true
    description: Send a cancellable multi-request HEAD check across a fixed list of known DVWA/Juice Shop paths only, using the in-process job registry and cancellation token between requests.
